<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Word Bites – Lobby</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- 🔥 Firebase (FLAT STRUCTURE) -->
  <script type="module">
    const showError = (msg) => {
      const box = document.getElementById("errorBox");
      if (box) {
        box.style.display = "block";
        box.textContent = "🔥 ERROR:\n" + msg;
      }
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      collection,
      query,
      where,
      onSnapshot,
      addDoc,
      updateDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    import {
      getAuth,
      signInAnonymously,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    let app, db, auth;
    let currentUser = null;
    let currentName = localStorage.getItem("word_bites_username") || "PLAYER";

    try {
      app = initializeApp({
        apiKey: "AIzaSyBQy33Ceipa8m42ccm5aOErw1PEieHjyw8",
        authDomain: "custom-word-bites.firebaseapp.com",
        projectId: "custom-word-bites",
        storageBucket: "custom-word-bites.appspot.com",
        messagingSenderId: "999136584278",
        appId: "1:999136584278:web:88671a551de8324b95d1f7"
      });

      db = getFirestore(app);
      auth = getAuth(app);
    } catch (err) {
      showError("Firebase init failed:\n" + err);
    }

    // ⭐ FLAT COLLECTIONS
    let usersCol = collection(db, "users");
    let matchesCol = collection(db, "matches");

    async function initLobby() {
      if (auth) {
        signInAnonymously(auth).catch((err) => {
          showError("Anonymous sign-in failed:\n" + err);
        });

        onAuthStateChanged(auth, async (user) => {
          if (!user) return;
          currentUser = user;

          const userRef = doc(db, "users", currentUser.uid);

          const snap = await getDoc(userRef);

          if (!snap.exists()) {
            await setDoc(userRef, {
              name: currentName,
              online: true,
              lastActive: Date.now()
            });
          } else {
            const data = snap.data();
            if (data.name) {
              currentName = data.name;
              localStorage.setItem("word_bites_username", data.name);
            }
          }

          await setDoc(userRef, {
            online: true,
            lastActive: Date.now()
          }, { merge: true });

          window.addEventListener("beforeunload", async () => {
            try {
              await setDoc(userRef, {
                online: false,
                lastActive: Date.now()
              }, { merge: true });
            } catch (e) {}
          });

          window._WB_LOBBY_CONTEXT = {
            db,
            usersCol,
            matchesCol,
            currentUser,
            get currentName() {
              return currentName;
            },
            async updateName(newName) {
              currentName = newName;
              localStorage.setItem("word_bites_username", newName);
              await setDoc(userRef, { name: newName }, { merge: true });
            }
          };
        });
      }
    }

    initLobby();
  </script>

  <!-- React + ReactDOM + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #020617;
      font-family: ui-sans-serif, system-ui;
    }
    #errorBox {
      display: none;
      background: #7f1d1d;
      color: #fecaca;
      padding: 16px;
      border-radius: 12px;
      margin: 16px;
      font-weight: bold;
      white-space: pre-wrap;
    }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 10px;
    }
  </style>
</head>

<body class="text-white">
  <div id="errorBox"></div>

  <div class="min-h-screen flex flex-col items-center p-4">
    <div class="w-full max-w-md">
      <div id="root"></div>
    </div>
  </div>

  <!-- ⭐ React Lobby App -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    function LobbyApp() {
      const [ready, setReady] = useState(false);
      const [currentUser, setCurrentUser] = useState(null);
      const [currentName, setCurrentName] = useState(localStorage.getItem("word_bites_username") || "PLAYER");
      const [onlineUsers, setOnlineUsers] = useState([]);
      const [incomingMatch, setIncomingMatch] = useState(null);
      const [outgoingMatch, setOutgoingMatch] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const interval = setInterval(() => {
          if (window._WB_LOBBY_CONTEXT && window._WB_LOBBY_CONTEXT.currentUser) {
            const ctx = window._WB_LOBBY_CONTEXT;
            setCurrentUser(ctx.currentUser);
            setCurrentName(ctx.currentName);
            setReady(true);
            setLoading(false);
            clearInterval(interval);
            attachListeners(ctx);
          }
        }, 200);

        setTimeout(() => setLoading(false), 8000);
        return () => clearInterval(interval);
      }, []);

      const attachListeners = (ctx) => {
        const { usersCol, matchesCol, currentUser } = ctx;

        // ⭐ Online users
        const qUsers = query(usersCol, where("online", "==", true));
        onSnapshot(qUsers, (snap) => {
          const list = [];
          snap.forEach((d) => {
            if (d.id === currentUser.uid) return;
            const data = d.data();
            list.push({
              id: d.id,
              name: data.name || "PLAYER",
              lastActive: data.lastActive || 0
            });
          });
          list.sort((a, b) => b.lastActive - a.lastActive);
          setOnlineUsers(list);
        });

        // Incoming match
        const qIncoming = query(
          matchesCol,
          where("guestId", "==", currentUser.uid),
          where("status", "==", "pending")
        );
        onSnapshot(qIncoming, (snap) => {
          let latest = null;
          snap.forEach((d) => latest = { id: d.id, ...d.data() });
          setIncomingMatch(latest);
        });

        // Outgoing match
        const qOutgoing = query(
          matchesCol,
          where("hostId", "==", currentUser.uid),
          where("status", "==", "pending")
        );
        onSnapshot(qOutgoing, (snap) => {
          let latest = null;
          snap.forEach((d) => latest = { id: d.id, ...d.data() });
          setOutgoingMatch(latest);
        });
      };

      const handleNameChange = async () => {
        const newName = prompt("Enter your display name:", currentName);
        if (!newName) return;
        setCurrentName(newName);
        await window._WB_LOBBY_CONTEXT.updateName(newName);
      };

      const handleChallenge = async (user) => {
        const { matchesCol, currentName } = window._WB_LOBBY_CONTEXT;
        const docRef = await addDoc(matchesCol, {
          hostId: currentUser.uid,
          hostName: currentName,
          guestId: user.id,
          guestName: user.name,
          status: "pending",
          createdAt: serverTimestamp()
        });
        setOutgoingMatch({
          id: docRef.id,
          hostId: currentUser.uid,
          hostName: currentName,
          guestId: user.id,
          guestName: user.name,
          status: "pending"
        });
      };

      const handleAccept = async () => {
        const matchRef = doc(window._WB_LOBBY_CONTEXT.matchesCol, incomingMatch.id);

        const seed = Math.floor(Math.random() * 999999999);

        await updateDoc(matchRef, {
          status: "playing",
          seed
        });

        window.location.href = `multiplayer.html?match=${incomingMatch.id}`;
      };

      const handleDecline = async () => {
        const matchRef = doc(window._WB_LOBBY_CONTEXT.matchesCol, incomingMatch.id);
        await updateDoc(matchRef, { status: "declined" });
        setIncomingMatch(null);
      };

      const handleBack = () => window.location.href = "main-menu.html";

      if (loading || !ready) {
        return (
          <div className="w-full mt-10 text-center text-slate-400 text-sm">
            Connecting to lobby...
          </div>
        );
      }

      return (
        <div className="w-full flex flex-col gap-4 mt-4">

          {/* Header */}
          <div>
            <h1 className="text-2xl font-black text-amber-400 tracking-tight">
              MULTIPLAYER LOBBY
            </h1>
            <p className="text-xs text-slate-400">
              Challenge anyone online
            </p>
          </div>

          <button
            onClick={handleBack}
            className="text-xs px-3 py-2 rounded-xl bg-slate-800 text-slate-200 border border-slate-600 hover:bg-slate-700 active:scale-95 transition"
          >
            MAIN MENU
          </button>

          {/* Profile */}
          <div className="bg-slate-900/80 border border-slate-700 rounded-3xl p-4 shadow-xl flex items-center justify-between">
            <div>
              <div className="text-xs text-slate-400">You are</div>
              <div className="text-lg font-black text-white">{currentName}</div>
              <div className="text-[10px] text-slate-500 mt-1">
                ID: {currentUser.uid.slice(0, 6)}...
              </div>
            </div>
            <button
              onClick={handleNameChange}
              className="text-xs px-3 py-2 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-500 active:scale-95 transition"
            >
              EDIT NAME
            </button>
          </div>

          {/* Online Users */}
          <div className="bg-slate-900/80 border border-slate-700 rounded-3xl p-4 shadow-xl">
            <div className="flex items-center justify-between mb-2">
              <span className="text-xs font-bold text-slate-300 uppercase">
                Online Players
              </span>
              <span className="text-xs text-slate-500">{onlineUsers.length}</span>
            </div>

            <div className="max-h-64 overflow-y-auto custom-scrollbar text-sm">
              {onlineUsers.length === 0 && (
                <div className="text-xs text-slate-500">
                  No one else is online right now.
                </div>
              )}

              {onlineUsers.map((u) => (
                <div
                  key={u.id}
                  className="flex items-center justify-between py-2 border-b border-slate-800 last:border-b-0"
                >
                  <div>
                    <div className="font-semibold text-slate-100">{u.name}</div>
                    <div className="text-[10px] text-slate-500">
                      ID: {u.id.slice(0, 6)}...
                    </div>
                  </div>
                  <button
                    onClick={() => handleChallenge(u)}
                    className="text-xs px-3 py-2 rounded-xl bg-emerald-500 text-emerald-950 font-bold hover:bg-emerald-400 active:scale-95 transition"
                  >
                    CHALLENGE
                  </button>
                </div>
              ))}
            </div>
          </div>

          {/* Outgoing */}
          {outgoingMatch && (
            <div className="bg-slate-900/80 border border-blue-700 rounded-3xl p-4 shadow-xl">
              <div className="text-xs text-slate-400 mb-1">Outgoing Challenge</div>
              <div className="text-sm text-slate-100 mb-2">
                Waiting for{" "}
                <span className="font-bold text-amber-300">
                  {outgoingMatch.guestName}
                </span>{" "}
                to accept...
              </div>
              <div className="text-[11px] text-slate-500 mb-2">
                Match ID: {outgoingMatch.id.slice(0, 8)}...
              </div>
            </div>
          )}

          {/* Incoming */}
          {incomingMatch && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm">
              <div className="w-full max-w-xs bg-slate-900 border border-slate-700 rounded-3xl p-4 shadow-2xl">
                <div className="text-xs text-slate-400 mb-1 text-center">
                  Incoming Challenge
                </div>
                <div className="text-sm text-center text-slate-100 mb-3">
                  <span className="font-bold text-amber-300">
                    {incomingMatch.hostName}
                  </span>{" "}
                  challenged you!
                </div>
                <div className="flex gap-3">
                  <button
                    onClick={handleAccept}
                    className="flex-1 py-2 rounded-2xl bg-emerald-500 text-emerald-950 font-bold text-xs shadow-md active:scale-95 transition-transform"
                  >
                    ACCEPT
                  </button>
                  <button
                    onClick={handleDecline}
                    className="flex-1 py-2 rounded-2xl bg-slate-700 text-slate-100 font-bold text-xs shadow-md active:scale-95 transition-transform"
                  >
                    DECLINE
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<LobbyApp />);
  </script>

</body>
</html>
