<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Word Bites – Main Menu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- 🔥 Firebase FIRST -->
  <script type="module">
    const showError = (msg) => {
      const box = document.getElementById("errorBox");
      if (box) {
        box.style.display = "block";
        box.textContent = "🔥 ERROR:\n" + msg;
      }
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc
    } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    import {
      getAuth,
      signInAnonymously,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    let app, db, auth;
    let currentUser = null;
    let currentName = localStorage.getItem("word_bites_username") || "PLAYER";
    let highScore = localStorage.getItem("word_bites_highscore") || 0;

    try {
      app = initializeApp({
        apiKey: "AIzaSyBQy33Ceipa8m42ccm5aOErw1PEieHjyw8",
        authDomain: "custom-word-bites.firebaseapp.com",
        projectId: "custom-word-bites",
        storageBucket: "custom-word-bites.appspot.com",
        messagingSenderId: "999136584278",
        appId: "1:999136584278:web:88671a551de8324b95d1f7"
      });

      db = getFirestore(app);
      auth = getAuth(app);
    } catch (err) {
      showError("Firebase init failed:\n" + err);
    }

    // ⭐ FLAT COLLECTION
    const usersCol = "users";

    if (auth) {
      signInAnonymously(auth);

      onAuthStateChanged(auth, async (user) => {
        if (!user) return;
        currentUser = user;

        const userRef = doc(db, usersCol, currentUser.uid);
        const snap = await getDoc(userRef);

        if (snap.exists()) {
          const data = snap.data();
          if (data.name) {
            currentName = data.name;
            localStorage.setItem("word_bites_username", data.name);
          }
          if (data.highScore) {
            highScore = data.highScore;
            localStorage.setItem("word_bites_highscore", data.highScore);
          }
        } else {
          await setDoc(userRef, {
            name: currentName,
            highScore: Number(highScore),
            lastActive: Date.now()
          });
        }

        document.getElementById("playerName").textContent = currentName;
        document.getElementById("bestScore").textContent = highScore;
      });
    }

    window.saveHighScoreToFirebase = async (score) => {
      if (!currentUser) return;
      const userRef = doc(db, usersCol, currentUser.uid);

      await setDoc(
        userRef,
        {
          name: currentName,
          highScore: score,
          lastActive: Date.now()
        },
        { merge: true }
      );
    };

    window.updateName = async () => {
      const newName = prompt("Enter your display name:", currentName);
      if (!newName) return;

      currentName = newName;
      localStorage.setItem("word_bites_username", newName);

      if (currentUser) {
        const userRef = doc(db, usersCol, currentUser.uid);
        await setDoc(userRef, { name: newName }, { merge: true });
      }

      document.getElementById("playerName").textContent = newName;
    };
  </script>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0f172a;
      font-family: ui-sans-serif, system-ui;
    }
    #errorBox {
      display: none;
      background: #7f1d1d;
      color: #fecaca;
      padding: 16px;
      border-radius: 12px;
      margin: 16px;
      font-weight: bold;
      white-space: pre-wrap;
    }
  </style>
</head>

<body class="text-white">
  <div id="errorBox"></div>

  <div class="min-h-screen flex flex-col items-center p-4">
    <div class="w-full max-w-md flex flex-col gap-6 mt-10">

      <h1 class="text-3xl font-black text-amber-400 text-center">
        WORD BITES
      </h1>

      <div class="bg-slate-900/80 border border-slate-700 rounded-3xl p-4 shadow-xl text-center">
        <div class="text-xs text-slate-400">Player</div>
        <div id="playerName" class="text-xl font-black text-white">PLAYER</div>
        <button
          onclick="updateName()"
          class="mt-2 text-xs px-3 py-2 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-500 active:scale-95 transition"
        >
          EDIT NAME
        </button>
      </div>

      <div class="bg-slate-900/80 border border-slate-700 rounded-3xl p-4 shadow-xl text-center">
        <div class="text-xs text-slate-400">Best Score</div>
        <div id="bestScore" class="text-xl font-black text-amber-300">0</div>
      </div>

      <button
        onclick="window.location.href='singleplayer.html'"
        class="py-3 rounded-2xl bg-green-500 text-green-950 font-black text-sm shadow-md active:scale-95 transition-transform"
      >
        SINGLE PLAYER
      </button>

      <button
        onclick="window.location.href='lobby.html'"
        class="py-3 rounded-2xl bg-blue-500 text-blue-950 font-black text-sm shadow-md active:scale-95 transition-transform"
      >
        MULTIPLAYER
      </button>

    </div>
  </div>
</body>
</html>
