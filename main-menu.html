<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Word Bites – Main Menu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- 🔥 Firebase FIRST -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      collection
    } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    import {
      getAuth,
      signInAnonymously,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const showError = (msg) => {
      const box = document.getElementById("errorBox");
      if (box) {
        box.style.display = "block";
        box.textContent = "🔥 ERROR:\n" + msg;
      }
    };

    const APP_ID = "word-bites-multiplayer";

    const firebaseConfig = {
      apiKey: "AIzaSyBQy33Ceipa8m42ccm5aOErw1PEieHjyw8",
      authDomain: "custom-word-bites.firebaseapp.com",
      projectId: "custom-word-bites",
      storageBucket: "custom-word-bites.appspot.com",
      messagingSenderId: "999136584278",
      appId: "1:999136584278:web:88671a551de8324b95d1f7"
    };

    let currentUser = null;
    let currentName = localStorage.getItem("word_bites_username") || "PLAYER";

    let app, db, auth, usersCol;

    try {
      app = initializeApp(firebaseConfig);
      db = getFirestore(app);
      auth = getAuth(app);
      usersCol = collection(db, "artifacts", APP_ID, "public", "data", "users");
    } catch (err) {
      showError("Firebase init failed:\n" + err);
    }

    if (auth) {
      signInAnonymously(auth).catch((err) => {
        showError("Anonymous sign-in failed:\n" + err);
      });

      onAuthStateChanged(auth, async (user) => {
        if (!user) return;
        currentUser = user;

        try {
          const userRef = doc(usersCol, currentUser.uid);
          const snap = await getDoc(userRef);

          if (!snap.exists()) {
            await setDoc(userRef, {
              name: currentName,
              online: true,
              lastActive: Date.now(),
              highScore: 0,
              mostWords: 0,
              totalWords: 0,
              roundsPlayed: 0,
              wins: 0,
              losses: 0,
              draws: 0
            });
          }

          window._WB_MENU_CONTEXT = {
            db,
            usersCol,
            currentUser,
            async getStats() {
              const s = await getDoc(doc(usersCol, currentUser.uid));
              return s.exists() ? s.data() : null;
            }
          };
        } catch (err) {
          showError("Error loading user stats:\n" + err);
        }
      });
    }
  </script>

  <!-- React + ReactDOM + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #020617;
      font-family: ui-sans-serif, system-ui;
    }
    #errorBox {
      display: none;
      background: #7f1d1d;
      color: #fecaca;
      padding: 16px;
      border-radius: 12px;
      margin: 16px;
      font-weight: bold;
      white-space: pre-wrap;
    }
  </style>
</head>

<body class="text-white">
  <div id="errorBox"></div>

  <div class="min-h-screen flex flex-col items-center p-4">
    <div class="w-full max-w-md">
      <div id="root"></div>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function MainMenu() {
      const [loading, setLoading] = useState(true);
      const [stats, setStats] = useState(null);

      useEffect(() => {
        const interval = setInterval(async () => {
          if (window._WB_MENU_CONTEXT && window._WB_MENU_CONTEXT.currentUser) {
            const s = await window._WB_MENU_CONTEXT.getStats();
            setStats(s);
            setLoading(false);
            clearInterval(interval);
          }
        }, 200);

        setTimeout(() => setLoading(false), 8000);
        return () => clearInterval(interval);
      }, []);

      if (loading || !stats) {
        return (
          <div className="w-full mt-10 text-center text-slate-400 text-sm">
            Loading your profile...
          </div>
        );
      }

      return (
        <div className="w-full flex flex-col gap-6 mt-4">
          <div className="text-center">
            <h1 className="text-4xl font-black text-amber-400 tracking-tight">
              WORD BITES
            </h1>
            <p className="text-xs text-slate-400 mt-1">
              Fast-paced tile-dragging word game
            </p>
          </div>

          <div className="bg-slate-900/80 border border-slate-700 rounded-3xl p-5 shadow-xl">
            <h2 className="text-sm font-bold text-slate-300 uppercase mb-3">
              Your Stats
            </h2>

            <div className="text-sm text-slate-200 space-y-1">
              <div>High Score: <span className="text-amber-300 font-bold">{stats.highScore}</span></div>
              <div>Most Words: <span className="text-amber-300 font-bold">{stats.mostWords}</span></div>
              <div>Total Words: <span className="text-amber-300 font-bold">{stats.totalWords}</span></div>
              <div>Rounds Played: <span className="text-amber-300 font-bold">{stats.roundsPlayed}</span></div>
            </div>

            <div className="mt-3 text-sm text-slate-200">
              Multiplayer Record:
              <div className="flex gap-4 mt-1 text-amber-300 font-bold">
                <span>Wins {stats.wins}</span>
                <span>Losses {stats.losses}</span>
                <span>Draws {stats.draws}</span>
              </div>
            </div>
          </div>

          <div className="flex flex-col gap-3">
            <button
              onClick={() => window.location.href = "singleplayer.html"}
              className="w-full py-3 rounded-2xl bg-green-500 text-green-950 font-black text-sm shadow-md active:scale-95 transition"
            >
              SINGLE PLAYER
            </button>

            <button
              onClick={() => window.location.href = "index.html"}
              className="w-full py-3 rounded-2xl bg-blue-500 text-blue-950 font-black text-sm shadow-md active:scale-95 transition"
            >
              MULTIPLAYER
            </button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<MainMenu />);
  </script>
</body>
</html>
