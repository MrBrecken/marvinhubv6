  <!-- 🔥 Firebase (FLAT STRUCTURE) -->
  <script type="module">
    const showError = (msg) => {
      const box = document.getElementById("errorBox");
      if (box) {
        box.style.display = "block";
        box.textContent = "🔥 ERROR:\n" + msg;
      }
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      updateDoc,
      onSnapshot,
      deleteDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    import {
      getAuth,
      signInAnonymously,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBQy33Ceipa8m42ccm5aOErw1PEieHjyw8",
      authDomain: "custom-word-bites.firebaseapp.com",
      projectId: "custom-word-bites",
      storageBucket: "custom-word-bites.appspot.com",
      messagingSenderId: "999136584278",
      appId: "1:999136584278:web:88671a551de8324b95d1f7"
    };

    let app, db, auth;
    let currentUser = null;
    let matchRef = null;
    let matchData = null;
    let role = null;

    try {
      app = initializeApp(firebaseConfig);
      db = getFirestore(app);
      auth = getAuth(app);
    } catch (err) {
      showError("Firebase init failed:\n" + err);
    }

    const urlParams = new URLSearchParams(window.location.search);
    const matchId = urlParams.get("match");

    if (!matchId) {
      showError("No match ID provided in URL.");
    }

    // ⭐ FLAT COLLECTION
    const MATCHES = "matches";

    const listeners = [];

    const notifyListeners = () => {
      listeners.forEach((fn) => {
        try { fn(matchData); } catch (e) {}
      });
    };

    const setupMatchListener = async () => {
      matchRef = doc(db, MATCHES, matchId);
      const snap = await getDoc(matchRef);

      if (!snap.exists()) {
        showError("Match not found.");
        return;
      }

      matchData = { id: snap.id, ...snap.data() };
      notifyListeners();

      onSnapshot(matchRef, (s) => {
        if (!s.exists()) {
          matchData = null;
          notifyListeners();
          return;
        }
        matchData = { id: s.id, ...s.data() };
        notifyListeners();
      });
    };

    const initAuth = () => {
      signInAnonymously(auth).catch((err) => {
        showError("Anonymous sign-in failed:\n" + err);
      });

      onAuthStateChanged(auth, async (user) => {
        if (!user) return;
        currentUser = user;

        await setupMatchListener();

        const interval = setInterval(() => {
          if (!matchData) return;
          if (!currentUser) return;

          if (matchData.hostId === currentUser.uid) role = "host";
          else if (matchData.guestId === currentUser.uid) role = "guest";
          else role = "spectator";

          clearInterval(interval);
        }, 200);
      });
    };

    initAuth();

    window._WB_MULTIPLAYER = {
      getMatchId() {
        return matchId;
      },
      getRole() {
        return role;
      },
      onMatchUpdate(fn) {
        listeners.push(fn);
        if (matchData) fn(matchData);
      },
      async updatePlayerState(score, words, finished) {
        if (!matchRef || !role) return;

        const payload = {};
        if (role === "host") {
          payload.hostScore = score;
          payload.hostWords = Array.from(words);
          if (finished) payload.hostFinished = true;
        } else if (role === "guest") {
          payload.guestScore = score;
          payload.guestWords = Array.from(words);
          if (finished) payload.guestFinished = true;
        }

        await updateDoc(matchRef, payload);

        // If both finished → finalize match
        const snap = await getDoc(matchRef);
        if (!snap.exists()) return;
        const data = snap.data();

        const hostDone = !!data.hostFinished;
        const guestDone = !!data.guestFinished;

        if (hostDone && guestDone && data.status !== "finished") {
          let winner = "draw";
          const hs = data.hostScore || 0;
          const gs = data.guestScore || 0;

          if (hs > gs) winner = "host";
          else if (gs > hs) winner = "guest";

          await updateDoc(matchRef, {
            status: "finished",
            winner,
            finishedAt: serverTimestamp()
          });
        }
      },
      async deleteMatchAndExit(toLobby) {
        try {
          if (matchRef) await deleteDoc(matchRef);
        } catch (e) {}

        window.location.href = toLobby ? "index.html" : "main-menu.html";
      }
    };
  </script>
