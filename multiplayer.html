<script type="module">

} from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
import {
  getAuth, signInAnonymously, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

const showError = (msg) => {
  const box = document.getElementById("errorBox");
  if (box) {
    box.style.display = "block";
    box.textContent = "ERROR:\n" + msg;
  }
};

try {
  const firebaseConfig = {
    apiKey: "AIzaSyBQy33Ceipa8m42ccm5aOErw1PEieHjyw8",
    authDomain: "custom-word-bites.firebaseapp.com",
    projectId: "custom-word-bites",
    storageBucket: "custom-word-bites.appspot.com",
    messagingSenderId: "999136584278",
    appId: "1:999136584278:web:88671a551de8324b95d1f7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  signInAnonymously(auth).catch((err) => {

  onAuthStateChanged(auth, async (user) => {

      window._WB_FIREBASE = { db, doc, updateDoc, onSnapshot, currentUser: user };

} catch (err) {
  showError("Firebase failed to load:\n" + err);

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<body class="text-white">
<div id="errorBox"></div>

<div class="min-h-screen flex flex-col items-center p-4">
  <div class="w-full max-w-md">
    <div id="root"></div>
  </div>
</div>

<!-- ⭐ React Game Code -->
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const COLS = 8;
const ROWS = 8;
const INITIAL_TIME = 90;
const VOWELS = "AEIOU";
const CONSONANTS = "BCDFGHJKLMNPQRSTVWXYZ";
const DICT_URL = "https://raw.githubusercontent.com/dwyl/english-words/master/words_alpha.txt";

// Seeded PRNG for identical initial board generation
function createPRNG(seed) {
  return function() {
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

function getCells(shape, gx, gy) {
  if (shape === "1x1") return [{ x: gx, y: gy }];
  if (shape === "2x1") return [{ x: gx, y: gy }, { x: gx + 1, y: gy }];
  if (shape === "1x2") return [{ x: gx, y: gy }, { x: gx, y: gy + 1 }];
  return [];
}

function Tile({ tile, cellSize, onMoveComplete, flashingCells, disabled }) {
  const [dragPos, setDragPos] = useState(null);
  const startPos = useRef(null);

  const w = tile.shape === "2x1" ? cellSize * 2 : cellSize;
  const h = tile.shape === "1x2" ? cellSize * 2 : cellSize;
  const px = tile.gridX * cellSize;
  const py = tile.gridY * cellSize;

  const isMoving = dragPos !== null;
  const currentX = isMoving ? dragPos.x : px;
  const currentY = isMoving ? dragPos.y : py;

  const handlePointerDown = (e) => {
    if (disabled) return;
    e.target.setPointerCapture(e.pointerId);
    startPos.current = { x: e.clientX, y: e.clientY, px, py };
    setDragPos({ x: px, y: py });
  };

  const handlePointerMove = (e) => {
    if (!startPos.current || disabled) return;
    const dx = e.clientX - startPos.current.x;
    const dy = e.clientY - startPos.current.y;
    setDragPos({ x: startPos.current.px + dx, y: startPos.current.py + dy });
  };

  const handlePointerUp = (e) => {
    if (!startPos.current || disabled) return;
    e.target.releasePointerCapture(e.pointerId);
    const dx = e.clientX - startPos.current.x;
    const dy = e.clientY - startPos.current.y;
    startPos.current = null;
    setDragPos(null);
    onMoveComplete(tile.id, dx, dy);
  };

  return (
    <div
      onPointerDown={handlePointerDown}
      onPointerMove={handlePointerMove}
      onPointerUp={handlePointerUp}
      onPointerCancel={handlePointerUp}
      className={`absolute flex items-center justify-center font-bold text-xl cursor-grab active:cursor-grabbing rounded-xl shadow-lg border-b-4 select-none touch-none transition-transform overflow-hidden ${
        isMoving ? "z-50 opacity-90 scale-105" : "z-10"
      } bg-amber-100 border-amber-300 text-amber-900`}
      style={{
        width: w - 4,
        height: h - 4,
        transform: `translate(${currentX + 2}px, ${currentY + 2}px)`,
        transition: isMoving ? "none" : "transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1)"
      }}
    >
      <div
        className="flex w-full h-full"
        style={{ flexDirection: tile.shape === "1x2" ? "column" : "row" }}
      >
        {tile.letters.map((l, i) => {
          const cellX = tile.shape === "2x1" ? tile.gridX + i : tile.gridX;
          const cellY = tile.shape === "1x2" ? tile.gridY + i : tile.gridY;
          const isFlashing = flashingCells.has(`${cellX},${cellY}`);

          return (
            <div
              key={i}
              className={`flex-1 flex items-center justify-center relative transition-colors duration-300 ${
                isFlashing ? "bg-green-500 text-white" : ""
              }`}
            >
              {l}
              {i === 0 && tile.shape !== "1x1" && (
                <div
                  className={`absolute bg-amber-900/10 z-10 ${
                    tile.shape === "2x1"
                      ? "right-0 top-1/4 bottom-1/4 w-[2px]"
                      : "bottom-0 left-1/4 right-1/4 h-[2px]"
                  }`}
                />
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function MultiplayerApp() {
  const [gameState, setGameState] = useState("LOADING");
  const [tiles, setTiles] = useState([]);
  const [timeLeft, setTimeLeft] = useState(INITIAL_TIME);
  const [isShuffling, setIsShuffling] = useState(false);
  const [isEnding, setIsEnding] = useState(false);
  
  const [currentScore, setCurrentScore] = useState(0);
  const [matchData, setMatchData] = useState(null);
  const [currentUser, setCurrentUser] = useState(null);
  
  const [collectedWords, setCollectedWords] = useState(new Set());
  const [flashingCells, setFlashingCells] = useState(new Set());
  const [boardSize, setBoardSize] = useState(0);
  const [dictLoaded, setDictLoaded] = useState(false);
  const [boardInitialized, setBoardInitialized] = useState(false);
  
  const boardRef = useRef(null);
  const collectedWordsRef = useRef(new Set());
  const dictionaryRef = useRef(new Set());

  // Wait for Firebase
  useEffect(() => {
    const interval = setInterval(() => {
      if (window._WB_FIREBASE && window._WB_FIREBASE.currentUser) {
        clearInterval(interval);
        setCurrentUser(window._WB_FIREBASE.currentUser);
        initMatchListener(window._WB_FIREBASE);
      }
    }, 100);
    return () => clearInterval(interval);
  }, []);

  const initMatchListener = (fb) => {
    const matchId = new URLSearchParams(window.location.search).get("match");
    if (!matchId) return;

    const matchRef = fb.doc(fb.db, "matches", matchId);
    fb.onSnapshot(matchRef, (snap) => {
      if (snap.exists()) {
        setMatchData(snap.data());
      }
    });
  };

  // Load Dictionary
  useEffect(() => {
    fetch(DICT_URL)
      .then((res) => res.text())
      .then((text) => {
        const words = text
          .split("\n")
          .map((w) => w.trim().toUpperCase())
          .filter((w) => w.length > 2);
        dictionaryRef.current = new Set(words);
        setDictLoaded(true);
      });
  }, []);

  // Responsive Board
  useEffect(() => {
    const updateSize = () => {
      if (boardRef.current) {
        setBoardSize(boardRef.current.clientWidth);
      }
    };
    window.addEventListener("resize", updateSize);
    updateSize();
    return () => window.removeEventListener("resize", updateSize);
  }, []);

  const getCellSize = () => (boardSize ? boardSize / COLS : 45);

  // Initialize Board when seed and dictionary are ready
  useEffect(() => {
    if (dictLoaded && matchData && matchData.seed && !boardInitialized) {
      setBoardInitialized(true);
      startGame(matchData.seed);
    }
  }, [dictLoaded, matchData, boardInitialized]);

  // Timer
  useEffect(() => {
    if (gameState !== "PLAYING" || isEnding) return;
    const timer = setInterval(() => {
      setTimeLeft((prev) => {
        if (prev <= 1) {
          endMultiplayerGame();
          return 0;
        }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(timer);
  }, [gameState, isEnding]);

  // Validation
  useEffect(() => {
    if (gameState !== "PLAYING" || dictionaryRef.current.size === 0) return;
    
    const grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    tiles.forEach((t) => {
      const c = getCells(t.shape, t.gridX, t.gridY);
      c.forEach((cell, i) => {
        grid[cell.y][cell.x] = { letter: t.letters[i], tileId: t.id };
      });
    });

    const newlyValidCells = new Set();
    const newWords = new Set();

    const checkLine = (lineCells, lineLetters) => {
      let currentWord = "";
      let currentCells = [];
      for (let i = 0; i <= lineLetters.length; i++) {
        if (i < lineLetters.length && lineLetters[i]) {
          currentWord += lineLetters[i];
          currentCells.push(lineCells[i]);
        } else {
          if (currentWord.length > 2 && dictionaryRef.current.has(currentWord)) {
            if (!collectedWordsRef.current.has(currentWord)) {
              newWords.add(currentWord);
              currentCells.forEach((cell) => newlyValidCells.add(cell));
            }
          }
          currentWord = "";
          currentCells = [];
        }
      }
    };

    for (let r = 0; r < ROWS; r++) {
      checkLine(
        Array.from({ length: COLS }, (_, c) => `${c},${r}`),
        Array.from({ length: COLS }, (_, c) => grid[r][c]?.letter)
      );
    }

    for (let c = 0; c < COLS; c++) {
      checkLine(
        Array.from({ length: ROWS }, (_, r) => `${c},${r}`),
        Array.from({ length: ROWS }, (_, r) => grid[r][c]?.letter)
      );
    }

    if (newWords.size > 0) {
      newWords.forEach((w) => collectedWordsRef.current.add(w));
      setCollectedWords(new Set(collectedWordsRef.current));
      
      const newScore = Array.from(collectedWordsRef.current).reduce(
        (acc, w) => acc + w.length * 100, 0
      );
      
      setCurrentScore(newScore);

      // Push score to Firebase
      if (window._WB_FIREBASE && matchData && currentUser) {
        const matchId = new URLSearchParams(window.location.search).get("match");
        const matchRef = window._WB_FIREBASE.doc(window._WB_FIREBASE.db, "matches", matchId);
        const isHost = matchData.hostId === currentUser.uid;
        window._WB_FIREBASE.updateDoc(matchRef, {
          [isHost ? "hostScore" : "guestScore"]: newScore
        });
      }

      setFlashingCells((prev) => {
        const next = new Set(prev);
        newlyValidCells.forEach(c => next.add(c));
        return next;
      });

      setTimeout(() => {
        setFlashingCells((prev) => {
          const next = new Set(prev);
          newlyValidCells.forEach(c => next.delete(c));
          return next;
        });
      }, 500);
    }
  }, [tiles, gameState]);

  // Uses provided rand() function so we can seed initial creation, and default Math.random() for shuffles
  const repositionTiles = (tilesArr, randomFunc = Math.random) => {
    const placed = [];
    const result = tilesArr.map(t => ({ ...t }));
    
    for (let t of result) {
      let gx, gy;
      let collision = true;
      let attempts = 0;
      
      while (collision && attempts < 1000) {
        gx = Math.floor(randomFunc() * (COLS - (t.shape === "2x1" ? 1 : 0)));
        gy = Math.floor(randomFunc() * (ROWS - (t.shape === "1x2" ? 1 : 0)));
        const req = getCells(t.shape, gx, gy);
        
        collision = req.some((c) =>
          placed.some((p) => {
            if (attempts < 600) return Math.abs(p.x - c.x) <= 1 && Math.abs(p.y - c.y) <= 1;
            else if (attempts < 900) return Math.abs(p.x - c.x) + Math.abs(p.y - c.y) <= 1;
            else return p.x === c.x && p.y === c.y;
          })
        );
        attempts++;
      }
      
      t.gridX = gx;
      t.gridY = gy;
      getCells(t.shape, gx, gy).forEach((c) => placed.push(c));
    }
    return result;
  };

  const generateLevelData = (prngFunc) => {
    let idCounter = 0;
    const newTiles = [];
    const add = (shape) => {
      const letters =
        shape.split("x").reduce((acc, val) => acc * parseInt(val), 1) === 2
          ? prngFunc() > 0.5
            ? [
                VOWELS[Math.floor(prngFunc() * VOWELS.length)],
                CONSONANTS[Math.floor(prngFunc() * CONSONANTS.length)]
              ]
            : [
                CONSONANTS[Math.floor(prngFunc() * CONSONANTS.length)],
                CONSONANTS[Math.floor(prngFunc() * CONSONANTS.length)]
              ]
          : [VOWELS[Math.floor(prngFunc() * VOWELS.length)]];

      newTiles.push({ id: `t_${idCounter++}`, shape, letters, gridX: 0, gridY: 0 });
    };

    for (let i = 0; i < 4; i++) add("1x1");
    for (let i = 0; i < 3; i++) add("2x1");
    for (let i = 0; i < 3; i++) add("1x2");

    return repositionTiles(newTiles, prngFunc);
  };

  const shuffleBoard = () => {
    if (isShuffling || isEnding || gameState !== "PLAYING") return;
    setIsShuffling(true);
    // Passing no argument means it uses default unseeded Math.random(), only affecting local player
    setTiles((prev) => repositionTiles(prev));
    setTimeout(() => setIsShuffling(false), 400);
  };

  const startGame = (seed) => {
    setTimeLeft(INITIAL_TIME);
    setCollectedWords(new Set());
    setFlashingCells(new Set());
    collectedWordsRef.current.clear();
    setCurrentScore(0);
    // Generate initial board using shared Seed
    setTiles(generateLevelData(createPRNG(seed)));
    setIsEnding(false);
    setGameState("PLAYING");
  };

  const endMultiplayerGame = () => {
    if (isEnding) return;
    setIsEnding(true);

    setTimeout(() => {
      const matchId = new URLSearchParams(window.location.search).get("match");
      window.location.href = `results.html?match=${matchId}`;
    }, 1500);
  };

  const handleMoveComplete = (id, dx, dy) => {
    if (isEnding || gameState !== "PLAYING") return;

    setTiles((prev) => {
      const idx = prev.findIndex((t) => t.id === id);
      const t = prev[idx];
      const sz = getCellSize();

      const nX = t.gridX + Math.round(dx / sz);
      const nY = t.gridY + Math.round(dy / sz);

      const req = getCells(t.shape, nX, nY);

      if (req.some((c) => c.x < 0 || c.x >= COLS || c.y < 0 || c.y >= ROWS)) return prev;

      if (req.some((r) => prev.some((o) => o.id !== id && getCells(o.shape, o.gridX, o.gridY).some((oc) => oc.x === r.x && oc.y === r.y)))) return prev;

      const next = [...prev];
      next[idx] = { ...t, gridX: nX, gridY: nY };
      return next;
    });
  };

  const formatTime = (secs) => {
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    return `${m}:${s < 10 ? "0" : ""}${s}`;
  };

  /* ---------------- UI RENDER ---------------- */

  if (gameState === "LOADING") {
    return (
      <div className="min-h-screen flex items-center justify-center text-slate-400 text-sm">
        Connecting to match & loading dictionary...
      </div>
    );
  }

  // Parse Player Data
  const isHost = matchData?.hostId === currentUser?.uid;
  const myName = isHost ? matchData?.hostName : matchData?.guestName;
  const opName = isHost ? matchData?.guestName : matchData?.hostName;
  const opScore = isHost ? (matchData?.guestScore || 0) : (matchData?.hostScore || 0);

  return (
    <div className="w-full flex flex-col gap-4 mt-4">

      {/* Header */}
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-2xl font-black text-amber-400 tracking-tight uppercase">Multiplayer</h1>
          <p className="text-[10px] text-slate-400">Match ID: {matchData?.seed}</p>
        </div>

        <div className="text-right">
          <div className="text-xs text-slate-400">TIME</div>
          <div className="text-2xl font-black text-white leading-none">
            {formatTime(timeLeft)}
          </div>
        </div>
      </div>

      {/* VS Score Bar */}
      <div className="flex items-center justify-between bg-slate-800/80 border border-slate-700 rounded-2xl px-4 py-3 shadow-lg">
        {/* Opponent (LEFT) */}
        <div className="text-left w-1/3">
          <div className="text-[10px] text-slate-400 uppercase truncate">{opName || "Opponent"}</div>
          <div className="text-xl font-black text-rose-400">{opScore}</div>
        </div>

        {/* Divider */}
        <div className="text-center w-1/3">
           <div className="text-xs font-black text-slate-500 italic opacity-50">VS</div>
        </div>

        {/* You (RIGHT) */}
        <div className="text-right w-1/3">
          <div className="text-[10px] text-slate-400 uppercase truncate">{myName || "You"}</div>
          <div className="text-xl font-black text-amber-400">{currentScore}</div>
        </div>
      </div>

      {/* Board */}
      <div
        ref={boardRef}
        className={
          "relative w-full overflow-hidden rounded-3xl bg-[#0e2138] board-grid border border-[#3b82f6]/40 shadow-2xl " +
          (isShuffling ? "shuffling" : "")
        }
        style={{
          width: "100%",
          aspectRatio: "1 / 1",
          "--cell-size": boardSize ? `${boardSize / COLS}px` : "45px"
        }}
      >
        {tiles.map((t) => (
          <Tile
            key={t.id}
            tile={t}
            cellSize={getCellSize()}
            onMoveComplete={handleMoveComplete}
            flashingCells={flashingCells}
            disabled={isEnding || gameState !== "PLAYING"}
          />
        ))}

        {isEnding && (
          <div className="absolute inset-0 z-[100] bg-black/60 flex items-center justify-center backdrop-blur-sm transition-all duration-300">
            <div className="text-3xl font-black text-amber-400 animate-bounce tracking-tighter uppercase text-center">
              Time&apos;s Up!<br/>
              <span className="text-sm text-white font-medium block mt-2">Redirecting to results...</span>
            </div>
          </div>
        )}
      </div>

      {/* Controls & Words */}
      <div className="flex gap-3 items-stretch h-[180px]">
        {/* Words Found Panel */}
        <div className="flex-1 bg-slate-900/80 border border-slate-700 rounded-3xl p-4 shadow-xl flex flex-col h-full">
          <div className="flex items-center justify-between mb-2">
            <span className="text-xs font-bold text-slate-300 uppercase">Your Words</span>
            <span className="text-xs text-slate-500">{collectedWords.size}</span>
          </div>

          <div className="flex-1 overflow-y-auto custom-scrollbar text-xs text-slate-200 pr-1">
            {collectedWords.size === 0 && (
              <div className="text-slate-500 text-[10px] italic mt-2">No words found yet...</div>
            )}
            {Array.from(collectedWords).map((w) => (
              <div key={w} className="flex justify-between py-1 border-b border-slate-800/50 last:border-0">
                <span>{w}</span>
                <span className="text-amber-300 font-bold">+{w.length * 100}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Shuffle Button */}
        <button
          onClick={shuffleBoard}
          disabled={isEnding || gameState !== "PLAYING"}
          className="w-24 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 active:scale-95 transition-all text-white font-bold rounded-3xl shadow-lg ring-2 ring-blue-400/30 flex flex-col items-center justify-center gap-2 h-full"
        >
          <svg className={"w-8 h-8 " + (isShuffling ? "animate-spin" : "")} fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
          <span className="text-[10px] tracking-wide">SHUFFLE</span>
        </button>
      </div>

    </div>
  );
}

try {
  const rootEl = document.getElementById("root");
  if (!rootEl) {
    const box = document.getElementById("errorBox");
    if (box) {
      box.style.display = "block";
      box.textContent = "ERROR:\nNo #root element found in HTML.";
    }
  } else {
    const root = ReactDOM.createRoot(rootEl);
    root.render(<MultiplayerApp />);
  }
} catch (err) {
  const box = document.getElementById("errorBox");
  if (box) {
    box.style.display = "block";
    box.textContent = "ERROR RENDERING REACT APP:\n" + err;
  }
}
</script>

</body>
</html>
