<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Word Bites – Multiplayer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- 🔥 Firebase FIRST -->
  <script type="module">
    const showError = (msg) => {
      const box = document.getElementById("errorBox");
      if (box) {
        box.style.display = "block";
        box.textContent = "🔥 ERROR:\n" + msg;
      }
    };

    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      updateDoc,
      onSnapshot,
      serverTimestamp,
      deleteDoc
    } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    import {
      getAuth,
      signInAnonymously,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const APP_ID = "word-bites-multiplayer";

    const firebaseConfig = {
      apiKey: "AIzaSyBQy33Ceipa8m42ccm5aOErw1PEieHjyw8",
      authDomain: "custom-word-bites.firebaseapp.com",
      projectId: "custom-word-bites",
      storageBucket: "custom-word-bites.appspot.com",
      messagingSenderId: "999136584278",
      appId: "1:999136584278:web:88671a551de8324b95d1f7"
    };

    let app, db, auth;
    try {
      app = initializeApp(firebaseConfig);
      db = getFirestore(app);
      auth = getAuth(app);
    } catch (err) {
      showError("Firebase init failed:\n" + err);
    }

    const urlParams = new URLSearchParams(window.location.search);
    const matchId = urlParams.get("match");

    if (!matchId) {
      showError("No match ID provided in URL.");
    }

    let currentUser = null;
    let matchRef = null;
    let listeners = [];
    let currentMatchData = null;
    let role = null; // "host" or "guest"

    const notifyListeners = () => {
      listeners.forEach((fn) => {
        try {
          fn(currentMatchData);
        } catch (e) {}
      });
    };

    const setupMatchListener = async () => {
      if (!db || !matchId) return;
      matchRef = doc(db, "artifacts", APP_ID, "public", "data", "matches", matchId);
      const snap = await getDoc(matchRef);
      if (!snap.exists()) {
        showError("Match not found.");
        return;
      }
      const data = snap.data();
      currentMatchData = { id: snap.id, ...data };
      notifyListeners();

      onSnapshot(matchRef, (s) => {
        if (!s.exists()) {
          currentMatchData = null;
          notifyListeners();
          return;
        }
        currentMatchData = { id: s.id, ...s.data() };
        notifyListeners();
      });
    };

    const initAuth = () => {
      if (!auth) return;
      signInAnonymously(auth).catch((err) => {
        showError("Anonymous sign-in failed:\n" + err);
      });

      onAuthStateChanged(auth, async (user) => {
        if (!user) return;
        currentUser = user;

        await setupMatchListener();

        // Determine role once we have match data
        const interval = setInterval(() => {
          if (!currentMatchData) return;
          if (!currentUser) return;
          if (currentMatchData.hostId === currentUser.uid) {
            role = "host";
          } else if (currentMatchData.guestId === currentUser.uid) {
            role = "guest";
          } else {
            role = "spectator";
          }
          clearInterval(interval);
        }, 200);
      });
    };

    initAuth();

    window._WB_MULTIPLAYER = {
      getMatchId() {
        return matchId;
      },
      getRole() {
        return role;
      },
      onMatchUpdate(fn) {
        listeners.push(fn);
        if (currentMatchData) fn(currentMatchData);
      },
      async updatePlayerState(score, words, finished) {
        if (!matchRef || !role) return;
        const payload = {};
        if (role === "host") {
          payload.hostScore = score;
          payload.hostWords = Array.from(words);
          if (finished) payload.hostFinished = true;
        } else if (role === "guest") {
          payload.guestScore = score;
          payload.guestWords = Array.from(words);
          if (finished) payload.guestFinished = true;
        }
        try {
          await updateDoc(matchRef, payload);
        } catch (e) {
          showError("Failed to update match:\n" + e);
        }

        // If both finished, mark match finished
        try {
          const snap = await getDoc(matchRef);
          if (!snap.exists()) return;
          const data = snap.data();
          const hostDone = !!data.hostFinished;
          const guestDone = !!data.guestFinished;
          if (hostDone && guestDone && data.status !== "finished") {
            let winner = "draw";
            const hs = data.hostScore || 0;
            const gs = data.guestScore || 0;
            if (hs > gs) winner = "host";
            else if (gs > hs) winner = "guest";
            await updateDoc(matchRef, {
              status: "finished",
              winner,
              finishedAt: serverTimestamp()
            });
          }
        } catch (e) {
          // ignore
        }
      },
      async deleteMatchAndExit(toLobby) {
        try {
          if (matchRef) {
            await deleteDoc(matchRef);
          }
        } catch (e) {
          // ignore
        }
        if (toLobby) {
          window.location.href = "lobby.html";
        } else {
          window.location.href = "main-menu.html";
        }
      }
    };
  </script>

<body class="text-white">
  <div id="errorBox"></div>

  <div class="min-h-screen flex flex-col items-center p-4">
    <div class="w-full max-w-md">
      <div id="root"></div>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const COLS = 8;
    const ROWS = 8;
    const INITIAL_TIME = 90;
    const FLASH_DURATION = 500;
    const VOWELS = "AEIOU";
    const CONSONANTS = "BCDFGHJKLMNPQRSTVWXYZ";
    const DICT_URL = "https://raw.githubusercontent.com/dwyl/english-words/master/words_alpha.txt";

    function getCells(shape, gx, gy) {
      if (shape === "1x1") return [{ x: gx, y: gy }];
      if (shape === "2x1") return [{ x: gx, y: gy }, { x: gx + 1, y: gy }];
      if (shape === "1x2") return [{ x: gx, y: gy }, { x: gx, y: gy + 1 }];
      return [];
    }

    // Seeded RNG (mulberry32)
    function mulberry32(a) {
      return function() {
        let t = a += 0x6D2B79F5;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    const Tile = ({ tile, cellSize, onMoveComplete, validCells, disabled }) => {
      const { id, shape, chars, gridX, gridY } = tile;
      const [isDragging, setIsDragging] = useState(false);
      const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
      const dragStartPos = useRef({ x: 0, y: 0 });

      const width = shape === "2x1" ? cellSize * 2 : cellSize;
      const height = shape === "1x2" ? cellSize * 2 : cellSize;

      const handlePointerDown = (e) => {
        if (disabled) return;
        try { e.target.setPointerCapture(e.pointerId); } catch (err) {}
        setIsDragging(true);
        dragStartPos.current = { x: e.clientX, y: e.clientY };
      };

      const handlePointerMove = (e) => {
        if (!isDragging) return;
        setDragOffset({
          x: e.clientX - dragStartPos.current.x,
          y: e.clientY - dragStartPos.current.y
        });
      };

      const handlePointerUp = (e) => {
        if (!isDragging) return;
        try { e.target.releasePointerCapture(e.pointerId); } catch (err) {}
        setIsDragging(false);
        const dx = e.clientX - dragStartPos.current.x;
        const dy = e.clientY - dragStartPos.current.y;
        setDragOffset({ x: 0, y: 0 });
        onMoveComplete(id, dx, dy);
      };

      return (
        <div
          onPointerDown={handlePointerDown}
          onPointerMove={handlePointerMove}
          onPointerUp={handlePointerUp}
          className={
            "absolute select-none touch-none rounded-md shadow-md font-bold text-lg flex items-center justify-center transition-all duration-300 " +
            (isDragging
              ? "z-50 scale-105 cursor-grabbing opacity-90 "
              : "z-10 cursor-grab hover:scale-[1.02] ") +
            (disabled ? "opacity-50 pointer-events-none " : "") +
            "bg-[#f4d48a] ring-1 ring-amber-700/50"
          }
          style={{
            width: width - 4,
            height: height - 4,
            left: gridX * cellSize + 2,
            top: gridY * cellSize + 2,
            transform: isDragging
              ? `translate(${dragOffset.x}px, ${dragOffset.y}px)`
              : "none",
            transitionProperty: isDragging
              ? "none"
              : "left, top, transform, background-color"
          }}
        >
          <div
            className={
              "w-full h-full flex " +
              (shape === "1x2"
                ? "flex-col divide-y divide-amber-700/20"
                : "flex-row divide-x divide-amber-700/20") +
              " pointer-events-none"
            }
          >
            {chars.map((char, i) => {
              let cx = gridX;
              let cy = gridY;
              if (shape === "2x1") cx += i;
              if (shape === "1x2") cy += i;
              const isCharValid = validCells.has(`${cx},${cy}`);
              return (
                <div
                  key={i}
                  className={
                    "flex-1 flex items-center justify-center rounded-sm transition-colors duration-300 " +
                    (isCharValid
                      ? "bg-green-400 text-green-950"
                      : "text-amber-950")
                  }
                >
                  {char}
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    function MultiplayerApp() {
      const [dictionary, setDictionary] = useState(new Set());
      const [tiles, setTiles] = useState([]);
      const [boardStats, setBoardStats] = useState({ validCells: new Set() });
      const [collectedWords, setCollectedWords] = useState(new Set());
      const [timeLeft, setTimeLeft] = useState(INITIAL_TIME);
      const [isShuffling, setIsShuffling] = useState(false);
      const [isEnding, setIsEnding] = useState(false);
      const [gameState, setGameState] = useState("LOADING"); // LOADING | READY | PLAYING | GAMEOVER
      const [role, setRole] = useState(null);
      const [opponentName, setOpponentName] = useState("OPPONENT");
      const [myName, setMyName] = useState("YOU");
      const [myScore, setMyScore] = useState(0);
      const [oppScore, setOppScore] = useState(0);
      const [matchStatus, setMatchStatus] = useState("pending");
      const [winner, setWinner] = useState(null);
      const [hostWords, setHostWords] = useState([]);
      const [guestWords, setGuestWords] = useState([]);

      const boardRef = useRef(null);
      const collectedWordsRef = useRef(new Set());
      const timerRef = useRef(null);
      const flashTimeoutRef = useRef(null);
      const seedRef = useRef(null);
      const startedRef = useRef(false);

      const getCellSize = () => {
        if (!boardRef.current) return 45;
        return boardRef.current.clientWidth / COLS;
      };

      const formatTime = (seconds) => {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m}:${s.toString().padStart(2, "0")}`;
      };

      const currentScore = Array.from(collectedWords).reduce(
        (acc, w) => acc + w.length * 100,
        0
      );

      // Load dictionary
      useEffect(() => {
        fetch(DICT_URL)
          .then((res) => res.text())
          .then((text) => {
            const words = new Set(
              text
                .split("\n")
                .map((w) => w.toUpperCase().trim())
                .filter((w) => w.length >= 3)
            );
            setDictionary(words);
          })
          .catch((err) => {
            const box = document.getElementById("errorBox");
            if (box) {
              box.style.display = "block";
              box.textContent =
                "Dictionary failed to load. Game will still run, but no words will be detected.\n\n" +
                err;
            }
          });
      }, []);

      // Seeded repositionTiles
      const repositionTilesSeeded = (inputTiles, rng) => {
        const newTiles = inputTiles.map((t) => ({ ...t }));
        const grid = Array(ROWS)
          .fill(null)
          .map(() => Array(COLS).fill(false));

        const isCellFree = (x, y) => {
          if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return false;
          return !grid[y][x];
        };

        const isPlacementValid = (tile, gx, gy) => {
          const cells = getCells(tile.shape, gx, gy);
          for (const c of cells) {
            if (!isCellFree(c.x, c.y)) return false;
          }
          for (const c of cells) {
            for (let dx = -1; dx <= 1; dx++) {
              for (let dy = -1; dy <= 1; dy++) {
                const nx = c.x + dx;
                const ny = c.y + dy;
                if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS) {
                  if (grid[ny][nx]) return false;
                }
              }
            }
          }
          return true;
        };

        newTiles.forEach((t) => {
          let placed = false;
          for (let attempts = 0; attempts < 2000 && !placed; attempts++) {
            let maxX = COLS - 1;
            let maxY = ROWS - 1;
            if (t.shape === "2x1") maxX = COLS - 2;
            if (t.shape === "1x2") maxY = ROWS - 2;
            const gx = Math.floor(rng() * (maxX + 1));
            const gy = Math.floor(rng() * (maxY + 1));
            if (isPlacementValid(t, gx, gy)) {
              getCells(t.shape, gx, gy).forEach((c) => (grid[c.y][c.x] = true));
              t.gridX = gx;
              t.gridY = gy;
              placed = true;
            }
          }
          if (!placed) {
            t.gridX = -10;
            t.gridY = -10;
          }
        });

        return newTiles;
      };

      const generateLevelDataFromSeed = (seed) => {
        const rng = mulberry32(seed >>> 0);
        const newTiles = [];
        let letterIndex = 0;

        const getLetter = () => {
          let char;
          if (letterIndex % 3 === 2) {
            char = VOWELS[Math.floor(rng() * VOWELS.length)];
          } else {
            char = CONSONANTS[Math.floor(rng() * CONSONANTS.length)];
          }
          letterIndex++;
          return char;
        };

        const add = (shape) => {
          const count = shape === "1x1" ? 1 : 2;
          const chars = [];
          for (let i = 0; i < count; i++) chars.push(getLetter());
          newTiles.push({
            id: Math.random().toString(36),
            shape,
            chars,
            gridX: 0,
            gridY: 0
          });
        };

        for (let i = 0; i < 4; i++) add("1x1");
        for (let i = 0; i < 3; i++) add("2x1");
        for (let i = 0; i < 3; i++) add("1x2");

        return repositionTilesSeeded(newTiles, rng);
      };

      const shuffleBoard = () => {
        if (isShuffling || isEnding || gameState !== "PLAYING") return;
        setIsShuffling(true);
        // Local shuffle: new local seed
        const localSeed = Math.floor(Math.random() * 0xffffffff);
        const newTiles = generateLevelDataFromSeed(localSeed);
        setTiles(newTiles);
        setTimeout(() => setIsShuffling(false), 400);
      };

      // Word detection (same as singleplayer, but multiplayer)
      useEffect(() => {
        if (
          tiles.length === 0 ||
          dictionary.size === 0 ||
          gameState !== "PLAYING"
        )
          return;

        const grid = Array(ROWS)
          .fill(null)
          .map(() => Array(COLS).fill(null));

        tiles.forEach((t) =>
          getCells(t.shape, t.gridX, t.gridY).forEach((c, i) => {
            if (c.y >= 0 && c.y < ROWS && c.x >= 0 && c.x < COLS) {
              grid[c.y][c.x] = { char: t.chars[i], id: t.id };
            }
          })
        );

        const found = [];
        const check = (seq) => {
          const w = seq.map((x) => x.char).join("");
          if (w.length >= 3 && dictionary.has(w)) found.push({ w, seq });
        };

        // Horizontal
        for (let y = 0; y < ROWS; y++) {
          let seq = [];
          for (let x = 0; x <= COLS; x++) {
            if (x < COLS && grid[y][x]) seq.push({ ...grid[y][x], x, y });
            else {
              if (seq.length >= 3) check(seq);
              seq = [];
            }
          }
        }

        // Vertical
        for (let x = 0; x < COLS; x++) {
          let seq = [];
          for (let y = 0; y <= ROWS; y++) {
            if (y < ROWS && grid[y][x]) seq.push({ ...grid[y][x], x, y });
            else {
              if (seq.length >= 3) check(seq);
              seq = [];
            }
          }
        }

        const newWords = found.filter(
          (f) => !collectedWordsRef.current.has(f.w)
        );
        if (newWords.length > 0) {
          newWords.forEach((f) => collectedWordsRef.current.add(f.w));
          const newSet = new Set(collectedWordsRef.current);
          setCollectedWords(newSet);

          const flash = new Set();
          newWords.forEach((f) =>
            f.seq.forEach((c) => flash.add(`${c.x},${c.y}`))
          );
          setBoardStats({ validCells: flash });
          if (flashTimeoutRef.current) clearTimeout(flashTimeoutRef.current);
          flashTimeoutRef.current = setTimeout(
            () => setBoardStats({ validCells: new Set() }),
            FLASH_DURATION
          );

          // Update score + words to Firestore
          const score = Array.from(newSet).reduce(
            (acc, w) => acc + w.length * 100,
            0
          );
          setMyScore(score);
          if (window._WB_MULTIPLAYER) {
            window._WB_MULTIPLAYER.updatePlayerState(score, newSet, false);
          }
        }
      }, [tiles, dictionary, gameState]);

      // Timer
      useEffect(() => {
        if (gameState !== "PLAYING" || isEnding) {
          if (timerRef.current) clearInterval(timerRef.current);
          return;
        }

        timerRef.current = setInterval(() => {
          setTimeLeft((prev) => {
            if (prev <= 1) {
              clearInterval(timerRef.current);
              endMultiplayerGame();
              return 0;
            }
            return prev - 1;
          });
        }, 1000);

        return () => clearInterval(timerRef.current);
      }, [gameState, isEnding]);

      const startFromSeed = (seed) => {
        seedRef.current = seed;
        setTimeLeft(INITIAL_TIME);
        setCollectedWords(new Set());
        collectedWordsRef.current.clear();
        setTiles(generateLevelDataFromSeed(seed));
        setIsEnding(false);
        setBoardStats({ validCells: new Set() });
        setGameState("PLAYING");
        startedRef.current = true;
      };

      const endMultiplayerGame = () => {
        if (isEnding) return;
        setIsEnding(true);
        const score = Array.from(collectedWordsRef.current).reduce(
          (acc, w) => acc + w.length * 100,
          0
        );
        setMyScore(score);
        if (window._WB_MULTIPLAYER) {
          window._WB_MULTIPLAYER.updatePlayerState(score, collectedWordsRef.current, true);
        }
        setTimeout(() => {
          setGameState("GAMEOVER");
          setIsEnding(false);
        }, 1200);
      };

      const handleMoveComplete = (id, dx, dy) => {
        if (isEnding || gameState !== "PLAYING") return;
        setTiles((prev) => {
          const idx = prev.findIndex((t) => t.id === id);
          const t = prev[idx];
          const sz = getCellSize();
          const nX = t.gridX + Math.round(dx / sz);
          const nY = t.gridY + Math.round(dy / sz);
          const req = getCells(t.shape, nX, nY);

          if (req.some((c) => c.x < 0 || c.x >= COLS || c.y < 0 || c.y >= ROWS))
            return prev;

          if (
            req.some((r) =>
              prev.some((o) =>
                o.id !== id &&
                getCells(o.shape, o.gridX, o.gridY).some(
                  (oc) => oc.x === r.x && oc.y === r.y
                )
              )
            )
          )
            return prev;

          const next = [...prev];
          next[idx] = { ...t, gridX: nX, gridY: nY };
          return next;
        });
      };

      // Hook into Firebase multiplayer context
      useEffect(() => {
        const interval = setInterval(() => {
          if (!window._WB_MULTIPLAYER) return;
          const r = window._WB_MULTIPLAYER.getRole();
          if (!r) return;
          setRole(r);

          window._WB_MULTIPLAYER.onMatchUpdate((m) => {
            if (!m) {
              // Match deleted
              setMatchStatus("deleted");
              return;
            }
            setMatchStatus(m.status || "pending");
            setHostWords(m.hostWords || []);
            setGuestWords(m.guestWords || []);
            setMyName(r === "host" ? (m.hostName || "YOU") : (m.guestName || "YOU"));
            setOpponentName(r === "host" ? (m.guestName || "OPPONENT") : (m.hostName || "OPPONENT"));

            const hs = m.hostScore || 0;
            const gs = m.guestScore || 0;
            if (r === "host") {
              setMyScore(hs);
              setOppScore(gs);
            } else if (r === "guest") {
              setMyScore(gs);
              setOppScore(hs);
            }

            if (m.winner) setWinner(m.winner);

            // Start game when status becomes "playing" and we haven't started yet
            if (m.status === "playing" && !startedRef.current && m.seed) {
              startFromSeed(m.seed);
            }

            // If match finished and we haven't ended locally, force GAMEOVER
            if (m.status === "finished" && gameState !== "GAMEOVER") {
              setGameState("GAMEOVER");
            }
          });

          setGameState("READY");
          clearInterval(interval);
        }, 200);

        return () => clearInterval(interval);
      }, [gameState]);

      const handleBackToLobby = () => {
        if (window._WB_MULTIPLAYER) {
          window._WB_MULTIPLAYER.deleteMatchAndExit(true);
        } else {
          window.location.href = "lobby.html";
        }
      };

      const handleBackToMenu = () => {
        if (window._WB_MULTIPLAYER) {
          window._WB_MULTIPLAYER.deleteMatchAndExit(false);
        } else {
          window.location.href = "main-menu.html";
        }
      };

      const outcomeLabel = () => {
        if (!winner || !role) return "MATCH OVER";
        if (winner === "draw") return "IT'S A DRAW!";
        if (winner === role) return "YOU WON!";
        return "YOU LOST";
      };

      const myWordsList = role === "host" ? hostWords : guestWords;
      const oppWordsList = role === "host" ? guestWords : hostWords;

      return (
        <div className="w-full flex flex-col gap-4 mt-4">
          {/* Header */}
          <div className="flex items-center justify-between">
            <div>
              <h1 className="text-2xl font-black text-amber-400">MULTIPLAYER</h1>
              <p className="text-xs text-slate-400">
                Same board, 90 seconds. Highest score wins.
              </p>
            </div>
            <div className="text-right">
              <div className="text-xs text-slate-400">TIME</div>
              <div className="text-2xl font-black text-white">
                {formatTime(timeLeft)}
              </div>
            </div>
          </div>

          {/* Score bar (your score + opponent score) */}
          <div className="flex items-center justify-between bg-slate-800/80 rounded-2xl px-4 py-3">
            <div>
              <div className="text-xs text-slate-400">YOUR SCORE</div>
              <div className="text-xl font-black text-white">{myScore}</div>
              <div className="text-[10px] text-slate-500 mt-1">
                {myName}
              </div>
            </div>
            <div className="text-right">
              <div className="text-xs text-slate-400">OPPONENT</div>
              <div className="text-xl font-black text-amber-300">{oppScore}</div>
              <div className="text-[10px] text-slate-500 mt-1">
                {opponentName}
              </div>
            </div>
          </div>

          {/* Board */}
          <div
            ref={boardRef}
            className={
              "relative w-full overflow-hidden rounded-3xl bg-[#0e2138] board-grid border border-[#3b82f6]/40 shadow-2xl " +
              (isShuffling ? "shuffling" : "")
            }
            style={{
              width: "100%",
              aspectRatio: "1 / 1",
              "--cell-size": boardRef.current
                ? `${boardRef.current.clientWidth / COLS}px`
                : "45px"
            }}
          >
            {tiles.map((t) => (
              <Tile
                key={t.id}
                tile={t}
                cellSize={getCellSize()}
                onMoveComplete={handleMoveComplete}
                validCells={boardStats.validCells}
                disabled={isEnding || gameState !== "PLAYING"}
              />
            ))}

            {gameState === "READY" && (
              <div className="absolute inset-0 flex items-center justify-center">
                <div className="bg-slate-900/80 rounded-2xl px-4 py-3 text-center text-sm text-slate-200">
                  Waiting for match to start...
                </div>
              </div>
            )}

            {isEnding && (
              <div className="absolute inset-0 z-[100] bg-black/60 flex items-center justify-center backdrop-blur-sm transition-all duration-300">
                <div className="text-3xl font-black text-amber-400 animate-bounce tracking-tighter uppercase">
                  Time&apos;s Up!
                </div>
              </div>
            )}
          </div>

          {/* Shuffle button */}
          <div className="flex justify-end mt-3">
            <button
              onClick={shuffleBoard}
              disabled={isEnding || gameState !== "PLAYING"}
              className="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 active:scale-90 transition-all text-white font-bold py-2 px-6 rounded-xl shadow-lg ring-2 ring-blue-400/30"
            >
              <svg
                className={"w-5 h-5" + (isShuffling ? " animate-spin" : "")}
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  strokeLinecap="round"
                  strokeLinejoin="round"
                  strokeWidth="2"
                  d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
                />
              </svg>
              SHUFFLE
            </button>
          </div>

          {/* Words found (yours) */}
          <div className="mt-3 bg-slate-900/80 border border-slate-700 rounded-3xl p-4 shadow-xl">
            <div className="flex items-center justify-between mb-2">
              <span className="text-xs font-bold text-slate-300 uppercase">
                Your Words
              </span>
              <span className="text-xs text-slate-500">
                {collectedWords.size}
              </span>
            </div>
            <div className="max-h-32 overflow-y-auto custom-scrollbar text-xs text-slate-200">
              {collectedWords.size === 0 && (
                <div className="text-slate-500 text-xs">
                  No words yet. Try lining up letters.
                </div>
              )}
              {Array.from(collectedWords).map((w) => (
                <div key={w} className="flex justify-between">
                  <span>{w}</span>
                  <span className="text-amber-300 font-bold">
                    +{w.length * 100}
                  </span>
                </div>
              ))}
            </div>
          </div>

          {/* Game Over / Results card */}
          {gameState === "GAMEOVER" && (
            <div className="mt-4 bg-slate-900/80 border border-slate-700 rounded-3xl p-4 shadow-xl">
              <h2 className="text-lg font-black text-amber-300 mb-2 text-center">
                {outcomeLabel()}
              </h2>
              <p className="text-slate-300 text-sm mb-2 text-center">
                Your Score:{" "}
                <span className="font-bold text-white">{myScore}</span>
              </p>
              <p className="text-slate-300 text-sm mb-2 text-center">
                Opponent:{" "}
                <span className="font-bold text-amber-300">{oppScore}</span>
              </p>

              <div className="grid grid-cols-2 gap-3 mt-3 text-xs">
                <div className="bg-slate-800/80 rounded-2xl p-3">
                  <div className="text-[10px] text-slate-400 mb-1 uppercase">
                    Your Words
                  </div>
                  <div className="max-h-24 overflow-y-auto custom-scrollbar">
                    {myWordsList && myWordsList.length > 0 ? (
                      myWordsList.map((w) => (
                        <div key={w} className="flex justify-between">
                          <span>{w}</span>
                          <span className="text-amber-300 font-bold">
                            +{w.length * 100}
                          </span>
                        </div>
                      ))
                    ) : (
                      <div className="text-slate-500">None</div>
                    )}
                  </div>
                </div>
                <div className="bg-slate-800/80 rounded-2xl p-3">
                  <div className="text-[10px] text-slate-400 mb-1 uppercase">
                    Opponent Words
                  </div>
                  <div className="max-h-24 overflow-y-auto custom-scrollbar">
                    {oppWordsList && oppWordsList.length > 0 ? (
                      oppWordsList.map((w) => (
                        <div key={w} className="flex justify-between">
                          <span>{w}</span>
                          <span className="text-amber-300 font-bold">
                            +{w.length * 100}
                          </span>
                        </div>
                      ))
                    ) : (
                      <div className="text-slate-500">None</div>
                    )}
                  </div>
                </div>
              </div>

              <div className="flex gap-3 mt-4">
                <button
                  onClick={handleBackToLobby}
                  className="flex-1 py-2 rounded-2xl bg-slate-700 text-slate-100 font-bold text-xs shadow-md active:scale-95 transition-transform"
                >
                  BACK TO LOBBY
                </button>
                <button
                  onClick={handleBackToMenu}
                  className="flex-1 py-2 rounded-2xl bg-slate-800 text-slate-100 font-bold text-xs shadow-md active:scale-95 transition-transform"
                >
                  MAIN MENU
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    try {
      const rootEl = document.getElementById("root");
      if (!rootEl) {
        const box = document.getElementById("errorBox");
        if (box) {
          box.style.display = "block";
          box.textContent = "🔥 ERROR:\nNo #root element found in HTML.";
        }
      } else {
        const root = ReactDOM.createRoot(rootEl);
        root.render(<MultiplayerApp />);
      }
    } catch (err) {
      const box = document.getElementById("errorBox");
      if (box) {
        box.style.display = "block";
        box.textContent = "🔥 ERROR RENDERING REACT APP:\n" + err;
      }
    }
  </script>
</body>
</html>
